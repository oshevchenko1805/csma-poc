# mavlink-router config for PX4 SITL instance 2 (sysid 3).
# See router_inst0.conf for the rationale and topology overview.
#
# Port mapping for inst 2:
#   PX4 inst 2 -> 127.0.0.1:14542  (we bind here, Server mode)
#   us -> Monitor (pymavlink)  at 127.0.0.1:14572
#   us -> MAVSDK (mavsdk_server) at 127.0.0.1:14562

[General]
TcpServerPort = 0
ReportStats = false
MavlinkDialect = common

[UdpEndpoint px4_inst2]
Mode = Server
Address = 0.0.0.0
Port = 14542

[UdpEndpoint monitor_inst2]
Mode = Normal
Address = 127.0.0.1
Port = 14572

[UdpEndpoint mavsdk_inst2]
Mode = Normal
Address = 127.0.0.1
Port = 14562
