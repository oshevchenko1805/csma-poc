# mavlink-router config for PX4 SITL instance 1 (sysid 2).
# See router_inst0.conf for the rationale and topology overview.
#
# Port mapping for inst 1:
#   PX4 inst 1 -> 127.0.0.1:14541  (we bind here, Server mode)
#   us -> Monitor (pymavlink)  at 127.0.0.1:14571
#   us -> MAVSDK (mavsdk_server) at 127.0.0.1:14561

[General]
TcpServerPort = 0
ReportStats = false
MavlinkDialect = common

[UdpEndpoint px4_inst1]
Mode = Server
Address = 0.0.0.0
Port = 14541

[UdpEndpoint monitor_inst1]
Mode = Normal
Address = 127.0.0.1
Port = 14571

[UdpEndpoint mavsdk_inst1]
Mode = Normal
Address = 127.0.0.1
Port = 14561
