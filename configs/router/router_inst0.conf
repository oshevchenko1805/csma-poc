# mavlink-router config for PX4 SITL instance 0 (sysid 1).
#
# PX4 inst 0 sends its onboard MAVLink stream to UDP 127.0.0.1:14540.
# This router takes that stream and fans it out to two consumers,
# resolving the port-14540 conflict between Monitor (pymavlink) and
# MAVSDK that blocked step 10b in the live PoC.
#
# Layout:
#   PX4 inst 0 (sysid 1)
#       |
#       v  UDP -> 127.0.0.1:14540
#   mavlink-routerd (this process)
#       |          |
#       v          v
#   Monitor    MAVSDK
#   :14570     :14560
#
# TcpServerPort = 0 disables the default TCP fanout on 5760. Three
# router instances would otherwise collide on that port.

[General]
TcpServerPort = 0
ReportStats = false
MavlinkDialect = common

# Incoming: PX4 inst 0 -> us, port 14540.
# Server mode: bind locally, learn PX4's source address from the first
# packet, allow bidirectional traffic (commands back to PX4).
[UdpEndpoint px4_inst0]
Mode = Server
Address = 0.0.0.0
Port = 14540

# Outgoing: us -> Monitor (pymavlink) listening at udpin:127.0.0.1:14570.
[UdpEndpoint monitor_inst0]
Mode = Normal
Address = 127.0.0.1
Port = 14570

# Outgoing: us -> MAVSDK (mavsdk_server) listening at udpin://0.0.0.0:14560.
# Note: MAVSDK 3.x rejects loopback-only binds (udpin://127.0.0.1:...);
# the MAVSDK side must use 0.0.0.0. The router still SENDS to 127.0.0.1
# here because that's where MAVSDK's bound socket receives.
[UdpEndpoint mavsdk_inst0]
Mode = Normal
Address = 127.0.0.1
Port = 14560
